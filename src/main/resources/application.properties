# ===============================
# Application Name
# ===============================
spring.application.name=demoRESTfullAPI
# ===============================
# Database Configuration
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/java_api?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
logging.level.org.springframework.security=DEBUG
# ===============================
# JWT Configuration
# ===============================
# application.properties
jwt.secret=mySecretKeyForJWTToken123456789012345678901234567890
jwt.expiration=86400000
# 86400000 milliseconds = 24 giờ
# 3600000 ms = 1 giờ
# 1800000 ms = 30 phút



